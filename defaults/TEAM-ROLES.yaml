# TEAM-ROLES.yaml (empty — no default roster)
#
# Fresh nodes start with only the 'main' bootstrap agent.
# The founding agent reads TEAM_INTENT and calls PUT /config/team-roles
# to write the real team roster.  Only then do additional agents appear.
#
# Do NOT add agents here. Use PUT /config/team-roles or write
# ${REFLECTT_HOME}/TEAM-ROLES.yaml on the host instead.
agents: []
